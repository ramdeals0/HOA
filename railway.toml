# Root Railway config — use when importing the monorepo from GitHub.
# Railway auto-detects pnpm workspaces; create separate services for API and Web.
#
# Recommended setup:
#   1. Add PostgreSQL plugin
#   2. Add service "hoa-api"  → Config path: apps/api/railway.toml (or Dockerfile.api)
#   3. Add service "hoa-web"  → Config path: apps/web/railway.toml (or Dockerfile.web)
#
# Do NOT set Root Directory to a subfolder — keep repo root so pnpm workspace resolves.

[build]
builder = "NIXPACKS"

[deploy]
restartPolicyType = "ON_FAILURE"
