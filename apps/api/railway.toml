[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.api"
watchPatterns = ["apps/api/**", "packages/shared/**", "Dockerfile.api"]

[deploy]
startCommand = "pnpm exec prisma migrate deploy && node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
